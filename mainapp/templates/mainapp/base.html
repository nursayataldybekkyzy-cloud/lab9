{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>
    <link rel="stylesheet" href="{% static 'mainapp/css/style.css' %}">
</head>
<body>

<header>
    <h1><a href="{% url 'home' %}">My Shop</a></h1>

    <nav>
    <a href="{% url 'home' %}">Басты бет</a>
    <a href="{% url 'catalog' %}">Каталог</a>

    {% if user.is_authenticated %}

        <a href="{% url 'add_category' %}">Санат қосу</a>
        <a href="{% url 'add_product' %}">Өнім қосу</a>

        <span style="margin-left:10px; color:green;">
            {{ user.username }}
        </span>

        <a href="{% url 'logout' %}" style="color:red;">Шығу</a>

    {% else %}

        <a href="{% url 'login' %}">Кіру</a>
        <a href="{% url 'register' %}">Тіркелу</a>

    {% endif %}
</nav>

</header>

<div class="container-content">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>© 2026 My Shop</p>
</footer>

</body>
</html>
